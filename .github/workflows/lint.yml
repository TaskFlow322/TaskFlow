name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies (backend)
        run: |
          cd backend
          npm ci
          
      - name: Run linter (backend)
        run: |
          cd backend
          npm run lint --if-present
        continue-on-error: true

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies (frontend)
        run: |
          cd frontend
          npm ci
          
      - name: Run linter (frontend)
        run: |
          cd frontend
          npm run lint --if-present
        continue-on-error: true

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies (backend)
        run: |
          cd backend
          npm ci
          
      - name: Run tests (backend)
        run: |
          cd backend
          npm test --if-present

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies (frontend)
        run: |
          cd frontend
          npm ci
          
      - name: Run tests (frontend)
        run: |
          cd frontend
          npm test --if-present