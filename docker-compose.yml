services:
  postgres:
    image: postgres:15-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow123
      POSTGRES_DB: taskflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: taskflow-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taskflow.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"

  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: taskflow-backend
    environment:
      DATABASE_URL: postgresql://taskflow:taskflow123@postgres:5432/taskflow_db
      REDIS_URL: redis://redis:6379
      PORT: 5000
    ports:
      - "3001:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/app        
      - /app/node_modules  
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
